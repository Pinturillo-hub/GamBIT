<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Chess Study - Juego de lógica basado en ajedrez">
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    
    <title>Chess Study</title>
</head>
<body>
    <!-- Welcome Screen -->
    <section id="welcome-screen" class="screen welcome-screen" aria-label="Bienvenida">
        <div class="welcome-content">
            <img class="welcome-icon" src="assets/images/rey.svg" alt="Pieza de ajedrez — Rey" aria-hidden="true">
            <h1 class="welcome-title crt-aberration">Chess Study</h1>
            <p class="welcome-subtitle crt-aberration">Juego de Lógica</p>
            <button id="btn-start" class="btn-start crt-aberration" aria-label="Comenzar juego">
                <span class="btn-start-icon" aria-hidden="true">▶</span>
                Comenzar
            </button>
        </div>
        <div class="crt-scanbar" aria-hidden="true"></div>
    </section>

    <!-- Game Screen -->
    <section id="game-screen" class="screen game-screen hidden" aria-label="Juego">
        <div class="crt-screen">
            <!-- Board Controls -->
            <nav class="controls-top" aria-label="Controles del tablero">
                <button class="control-btn" id="btn-rotate-left" title="Girar izquierda" aria-label="Girar tablero a la izquierda">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" aria-hidden="true">
                        <path d="M1 4v6h6M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
                    </svg>
                </button>
                <button class="control-btn" id="btn-mirror-v" title="Espejo vertical" aria-label="Espejo vertical del tablero">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M12 4v16"/>
                        <path d="M8 8l4-4 4 4"/>
                        <path d="M8 16l4 4 4-4"/>
                    </svg>
                </button>
                <button class="control-btn" id="btn-mirror-h" title="Espejo horizontal" aria-label="Espejo horizontal del tablero">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M4 12h16"/>
                        <path d="M8 8l-4 4 4 4"/>
                        <path d="M16 8l4 4-4 4"/>
                    </svg>
                </button>
                <button class="control-btn" id="btn-rotate-right" title="Girar derecha" aria-label="Girar tablero a la derecha">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" aria-hidden="true">
                        <path d="M23 4v6h-6M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/>
                    </svg>
                </button>
            </nav>

            <!-- Board -->
            <div class="middle-zone">
                <div class="board" id="board" role="grid" aria-label="Tablero de juego">
                    <div class="cell" data-row="0" data-col="0" role="gridcell"></div>
                    <div class="cell" data-row="0" data-col="1" role="gridcell"></div>
                    <div class="cell" data-row="0" data-col="2" role="gridcell"></div>
                    <div class="cell" data-row="1" data-col="0" role="gridcell"></div>
                    <div class="cell" data-row="1" data-col="1" role="gridcell"></div>
                    <div class="cell" data-row="1" data-col="2" role="gridcell"></div>
                    <div class="cell" data-row="2" data-col="0" role="gridcell"></div>
                    <div class="cell" data-row="2" data-col="1" role="gridcell"></div>
                    <div class="cell" data-row="2" data-col="2" role="gridcell"></div>
                </div>
            </div>

            <!-- Time Overlay -->
            <div id="time-overlay" class="time-overlay hidden" role="alert" aria-live="assertive">
                <div class="time-overlay-content">
                    <span class="time-overlay-text">¡Tiempo!</span>
                </div>
            </div>

            <!-- Bottom Controls -->
            <div class="controls-bottom">
                <button class="btn-clock" id="btn-clock" aria-label="Iniciar cronómetro">
                    <span id="clock-icon" class="clock-icon">
                        <svg viewBox="0 0 256 256" width="32" height="32" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="m36 18l4-8 8-4h159l11 8 1 12-57 98-1 6 58 100-1 13-9 8h-163l-10-12v-7l59-103-59-104zm76 111l-61 107h153l-61-107 61-108h-152zm-8-46l46 2-23 38zm23 50l50 87h-99z"/></svg>
                    </span>
                    <span id="clock-text" class="clock-text hidden" aria-live="polite">01:00</span>
                </button>
                <button class="btn-next" id="btn-next" aria-label="Siguiente carta">
                    ▶ Nueva
                </button>
            </div>

            <!-- Scanbar CRT -->
            <div class="crt-scanbar" aria-hidden="true"></div>
        </div>
    </section>

    <!-- Mute toggle -->
    <button id="btn-mute" class="btn-mute" aria-label="Silenciar música">
        <svg class="icon-sound-on" viewBox="0 0 16 16" width="24" height="24" shape-rendering="crispEdges" fill="currentColor" aria-hidden="true">
            <rect x="1" y="5" width="3" height="6"/>
            <polygon points="4,3 4,13 10,15 10,1"/>
            <rect x="12" y="6" width="1" height="4"/>
            <rect x="14" y="4" width="1" height="8"/>
        </svg>
        <svg class="icon-sound-off" viewBox="0 0 16 16" width="24" height="24" shape-rendering="crispEdges" fill="currentColor" aria-hidden="true">
            <rect x="1" y="5" width="3" height="6"/>
            <polygon points="4,3 4,13 10,15 10,1"/>
            <line x1="1" y1="15" x2="15" y2="1" stroke="currentColor" stroke-width="2"/>
        </svg>
    </button>
    
    <script src="app.js" defer></script>
</body>
</html>
