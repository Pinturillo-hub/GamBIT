<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#2c2218">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Chess Study - Juego de lógica basado en ajedrez">
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    
    <title>Chess Study</title>
</head>
<body>
    <!-- PANTALLA DE BIENVENIDA -->
    <div id="welcome-screen" class="screen welcome-screen">
        <div class="welcome-content">
            <img class="welcome-icon" src="assets/images/rey.svg" alt="">
            <h1 class="welcome-title crt-aberration">Chess Study</h1>
            <p class="welcome-subtitle crt-aberration">Juego de Lógica</p>
            <button id="btn-start" class="btn-start crt-aberration">
                <span class="btn-start-icon">▶</span>
                Comenzar
            </button>
        </div>
        <div class="crt-scanbar"></div>
    </div>

    <!-- PANTALLA DE JUEGO -->
    <div id="game-screen" class="screen game-screen hidden">
        <div class="crt-screen">
            <!-- Zona superior: Controles de tablero -->
            <div class="controls-top">
                <button class="control-btn" id="btn-rotate-left" title="Girar izquierda">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <path d="M1 4v6h6M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
                    </svg>
                </button>
                <button class="control-btn" id="btn-mirror-v" title="Espejo vertical">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 4v16"/>
                        <path d="M8 8l4-4 4 4"/>
                        <path d="M8 16l4 4 4-4"/>
                    </svg>
                </button>
                <button class="control-btn" id="btn-mirror-h" title="Espejo horizontal">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 12h16"/>
                        <path d="M8 8l-4 4 4 4"/>
                        <path d="M16 8l4 4-4 4"/>
                    </svg>
                </button>
                <button class="control-btn" id="btn-rotate-right" title="Girar derecha">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <path d="M23 4v6h-6M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/>
                    </svg>
                </button>
            </div>

            <!-- Zona media: Tablero -->
            <div class="middle-zone">
                <div class="board" id="board">
                    <div class="cell" data-row="0" data-col="0"></div>
                    <div class="cell" data-row="0" data-col="1"></div>
                    <div class="cell" data-row="0" data-col="2"></div>
                    <div class="cell" data-row="1" data-col="0"></div>
                    <div class="cell" data-row="1" data-col="1"></div>
                    <div class="cell" data-row="1" data-col="2"></div>
                    <div class="cell" data-row="2" data-col="0"></div>
                    <div class="cell" data-row="2" data-col="1"></div>
                    <div class="cell" data-row="2" data-col="2"></div>
                </div>
            </div>

            <!-- Overlay de tiempo agotado -->
            <div id="time-overlay" class="time-overlay hidden">
                <div class="time-overlay-content">
                    <span class="time-overlay-text">¡Tiempo!</span>
                </div>
            </div>

            <!-- Zona inferior: Panel de control -->
            <div class="controls-bottom">
                <button class="btn-clock" id="btn-clock">
                    <span id="clock-icon" class="clock-icon">
                        <svg viewBox="0 0 256 256" width="32" height="32" fill="currentColor"><path fill-rule="evenodd" d="m36 18l4-8 8-4h159l11 8 1 12-57 98-1 6 58 100-1 13-9 8h-163l-10-12v-7l59-103-59-104zm76 111l-61 107h153l-61-107 61-108h-152zm-8-46l46 2-23 38zm23 50l50 87h-99z"/></svg>
                    </span>
                    <span id="clock-text" class="clock-text hidden">01:00</span>
                </button>
                <button class="btn-next" id="btn-next">
                    ▶ Siguiente
                </button>
            </div>

            <!-- Scanbar CRT -->
            <div class="crt-scanbar"></div>
        </div>
    </div>
    
    <script src="app.js" defer></script>
</body>
</html>
